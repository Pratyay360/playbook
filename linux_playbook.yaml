---
- name: Setup servers
  hosts: all
  become: true
  gather_facts: true

  tasks:
    # --- Podman Installation ---
    - name: Install podman (apt-based)
      ansible.builtin.apt:
        name: podman
        state: present
        update_cache: true
      when: ansible_facts['pkg_mgr'] == 'apt'

    - name: Install podman (dnf-based)
      ansible.builtin.dnf:
        name: podman
        state: present
      when: ansible_facts['pkg_mgr'] == 'dnf'

    - name: Install podman (pacman-based)
      community.general.pacman:
        name: podman
        state: present
        update_cache: true
      when: ansible_facts['pkg_mgr'] == 'pacman'

    - name: Install podman (zypper-based)
      community.general.zypper:
        name: podman
        state: present
      when: ansible_facts['pkg_mgr'] == 'zypper'

    - name: Install podman (portage-based)
      community.general.portage:
        package: app-containers/podman
        state: present
      when: ansible_facts['pkg_mgr'] == 'portage'

    - name: Install podman (FreeBSD pkg)
      community.general.pkgng:
        name: podman
        state: present
      when: ansible_facts['os_family'] == 'FreeBSD'

    # --- Utilities Installation ---
    - name: Install curl and wget (OS Agnostic)
      ansible.builtin.package:
        name:
          - curl
          - wget
        state: present
      when: ansible_facts['pkg_mgr'] != 'portage'

    - name: Install curl and wget (Portage)
      community.general.portage:
        package:
          - net-misc/curl
          - net-misc/wget
        state: present
      when: ansible_facts['pkg_mgr'] == 'portage'

    # --- Environment Setup ---
    - name: Ensure ~/.local/bin exists
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.local/bin"
        state: directory
        mode: "0755"
      become: false

    # --- UV Installation ---
    - name: Download uv install script
      ansible.builtin.get_url:
        url: https://astral.sh/uv/install.sh
        dest: /tmp/uv-install.sh
        mode: "0755"
      become: false

    - name: Install uv via install script
      ansible.builtin.command:
        cmd: /bin/sh /tmp/uv-install.sh
      args:
        creates: "{{ ansible_env.HOME }}/.local/bin/uv"
      become: false

    # --- Podlet Installation ---
    - name: Detect system architecture
      ansible.builtin.set_fact:
        podlet_arch: >-
          {{
            'x86_64-unknown-linux-musl' if ansible_facts['architecture'] == 'x86_64' and ansible_facts['os_family'] != 'FreeBSD'
            else 'aarch64-unknown-linux-musl' if ansible_facts['architecture'] == 'aarch64'
            else 'x86_64-unknown-freebsd' if ansible_facts['os_family'] == 'FreeBSD'
            else 'x86_64-unknown-linux-musl'
          }}

    - name: Download podlet archive
      ansible.builtin.get_url:
        url: "https://github.com/containers/podlet/releases/download/v0.3.1/podlet-{{ podlet_arch }}.tar.xz"
        dest: "/tmp/podlet-{{ podlet_arch }}.tar.xz"
        mode: "0644"
      become: false

    - name: Extract podlet archive
      ansible.builtin.unarchive:
        src: "/tmp/podlet-{{ podlet_arch }}.tar.xz"
        dest: /tmp
        remote_src: true
      become: false

    - name: Install podlet binary
      ansible.builtin.copy:
        src: /tmp/podlet
        dest: "{{ ansible_env.HOME }}/.local/bin/podlet"
        mode: "0755"
        remote_src: true
      become: false

    - name: Remove podlet archive
      ansible.builtin.file:
        path: "/tmp/podlet-{{ podlet_arch }}.tar.xz"
        state: absent
      become: false

    # --- PATH Configuration ---
    - name: Ensure ~/.local/bin is in PATH via shell rc
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/{{ item }}"
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        create: true
        mode: "0644"
      become: false
      loop:
        - .bashrc
        - .zshrc
        - .profile

    # --- Podman-Compose Installation ---
    - name: Install podman-compose via uv
      ansible.builtin.shell:
        cmd: uv tool install podman-compose
        executable: /bin/sh
      environment:
        PATH: "{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH | default('/usr/bin:/bin') }}"
      args:
        creates: "{{ ansible_env.HOME }}/.local/bin/podman-compose"
      become: false

    # --- Backups Setup ---
    - name: Ensure .local/bin directory exists for backups
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.local/bin"
        state: directory
        mode: "0755"
      become: false

    # --- Cron Jobs ---
    - name: Schedule daily backups
      ansible.builtin.cron:
        name: "Run daily system backups"
        minute: "0"
        hour: "2"
        job: "{{ ansible_env.HOME }}/.local/bin/backups.sh >> {{ ansible_env.HOME }}/backup.log 2>&1"
      become: false

    # --- Caddy Setup ---
    - name: Create Caddy configuration directory
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/containers/Caddy"
        state: directory
        mode: "0755"
      become: false

    - name: Download Caddy docker-compose.yml
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/plutoploy/caddy-cloudflare-sqllite/refs/heads/main/docker-compose.yml
        dest: "{{ ansible_env.HOME }}/containers/Caddy/docker-compose.yml"
        mode: "0644"
      become: false

    - name: Download Caddy configuration
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/plutoploy/caddy-cloudflare-sqllite/refs/heads/main/caddy.json
        dest: "{{ ansible_env.HOME }}/containers/Caddy/caddy.json"
        mode: "0644"
      become: false

    - name: Start Caddy via podman-compose
      ansible.builtin.shell:
        cmd: podman-compose up -d
        chdir: "{{ ansible_env.HOME }}/containers/Caddy"
      environment:
        PATH: "{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH | default('/usr/bin:/bin') }}"
      become: false
      register: caddy_start
      changed_when: "'Running' not in caddy_start.stdout"
